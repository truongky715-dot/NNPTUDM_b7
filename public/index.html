<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #22c55e;
      --warning: #f59e0b;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
    }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 60px;
      box-shadow: var(--shadow);
    }
    header .logo { font-size: 20px; font-weight: 700; color: var(--primary); }
    header .subtitle { font-size: 13px; color: var(--muted); }

    /* ── Layout ── */
    .container { max-width: 1200px; margin: 32px auto; padding: 0 24px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--surface); border-radius: var(--radius); padding: 6px; width: fit-content; box-shadow: var(--shadow); }
    .tab-btn {
      padding: 9px 24px; border: none; border-radius: 7px; font-size: 14px; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--muted); transition: all .2s;
    }
    .tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 2px 6px rgba(79,70,229,.35); }
    .tab-btn:hover:not(.active) { background: var(--bg); color: var(--text); }

    /* ── Card ── */
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .card-header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .card-header h2 { font-size: 16px; font-weight: 600; }
    .card-body { padding: 0; }

    /* ── Button ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border: none; border-radius: 7px; font-size: 13px;
      font-weight: 500; cursor: pointer; transition: all .15s; text-decoration: none;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: var(--danger-hover); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-warning { background: var(--warning); color: #fff; }
    .btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead tr { background: #f8fafc; }
    th { padding: 11px 16px; text-align: left; font-weight: 600; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .empty-row td { text-align: center; padding: 40px; color: var(--muted); font-style: italic; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4); backdrop-filter: blur(2px);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
      transition: opacity .2s;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); border-radius: 14px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg);
      animation: modalIn .2s ease;
    }
    @keyframes modalIn { from { transform: scale(.95) translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal-header { padding: 20px 24px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-size: 16px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); line-height: 1; padding: 2px 6px; border-radius: 5px; }
    .modal-close:hover { background: var(--bg); color: var(--text); }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    .modal-footer { padding: 16px 24px 20px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--border); }

    /* ── Form ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 13px; font-weight: 500; color: var(--text); }
    input, select, textarea {
      padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 13.5px; font-family: inherit; color: var(--text);
      transition: border .15s, box-shadow .15s; background: var(--surface);
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    textarea { resize: vertical; min-height: 72px; }
    .hint { font-size: 11.5px; color: var(--muted); }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast {
      padding: 12px 18px; border-radius: 9px; font-size: 13.5px; font-weight: 500;
      color: #fff; box-shadow: var(--shadow-lg); animation: toastIn .25s ease;
      max-width: 340px;
    }
    @keyframes toastIn { from { transform: translateX(80px); opacity: 0; } to { transform: none; opacity: 1; } }
    .toast-success { background: #166534; }
    .toast-error   { background: #991b1b; }

    /* ── Avatar ── */
    .avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">⚙️ Admin Panel</div>
  <div class="subtitle">Node.js + SQLite</div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('roles')">👥 Roles</button>
    <button class="tab-btn" onclick="switchTab('users')">👤 Users</button>
  </div>

  <!-- ══ ROLES TAB ══ -->
  <div id="tab-roles" class="tab-panel active">
    <div class="card">
      <div class="card-header">
        <h2>Roles Management</h2>
        <button class="btn btn-primary" onclick="openRoleModal()">+ New Role</button>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table id="roles-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Description</th>
                <th>Created At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="roles-tbody">
              <tr class="empty-row"><td colspan="5">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ USERS TAB ══ -->
  <div id="tab-users" class="tab-panel">
    <div class="card">
      <div class="card-header">
        <h2>Users Management</h2>
        <button class="btn btn-primary" onclick="openUserModal()">+ New User</button>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table id="users-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Avatar</th>
                <th>Username</th>
                <th>Email</th>
                <th>Full Name</th>
                <th>Role</th>
                <th>Status</th>
                <th>Logins</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr class="empty-row"><td colspan="9">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ ROLE MODAL ══ -->
<div id="role-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="role-modal-title">New Role</h3>
      <button class="modal-close" onclick="closeModal('role-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="role-id" />
      <div class="form-group">
        <label for="role-name">Name <span style="color:var(--danger)">*</span></label>
        <input id="role-name" type="text" placeholder="e.g. Admin" />
      </div>
      <div class="form-group">
        <label for="role-description">Description</label>
        <textarea id="role-description" placeholder="Optional description…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('role-modal')">Cancel</button>
      <button class="btn btn-primary" id="role-save-btn" onclick="saveRole()">Save</button>
    </div>
  </div>
</div>

<!-- ══ USER MODAL ══ -->
<div id="user-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h3 id="user-modal-title">New User</h3>
      <button class="modal-close" onclick="closeModal('user-modal')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="user-id" />
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div class="form-group">
          <label>Username <span style="color:var(--danger)">*</span></label>
          <input id="user-username" type="text" placeholder="johndoe" />
        </div>
        <div class="form-group">
          <label>Email <span style="color:var(--danger)">*</span></label>
          <input id="user-email" type="email" placeholder="john@example.com" />
        </div>
        <div class="form-group">
          <label id="user-password-label">Password <span style="color:var(--danger)">*</span></label>
          <input id="user-password" type="password" placeholder="••••••••" />
          <span class="hint" id="user-password-hint"></span>
        </div>
        <div class="form-group">
          <label>Full Name</label>
          <input id="user-fullname" type="text" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="user-role">
            <option value="">— No role —</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="user-status">
            <option value="0">Inactive</option>
            <option value="1">Active</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Avatar URL</label>
        <input id="user-avatar" type="text" placeholder="https://…" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('user-modal')">Cancel</button>
      <button class="btn btn-primary" id="user-save-btn" onclick="saveUser()">Save</button>
    </div>
  </div>
</div>

<!-- ══ DELETE CONFIRM MODAL ══ -->
<div id="confirm-modal" class="modal-overlay hidden">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <h3>Confirm Delete</h3>
      <button class="modal-close" onclick="closeModal('confirm-modal')">×</button>
    </div>
    <div class="modal-body">
      <p id="confirm-message" style="color:var(--muted);line-height:1.6"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('confirm-modal')">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
/* ─────────────── Helpers ─────────────── */
const API = '';

async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...options,
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.message || 'Request failed');
  return data;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function fmtDate(str) {
  if (!str) return '—';
  return new Date(str).toLocaleString();
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────── Tabs ─────────────── */
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(name)) b.classList.add('active');
  });
  if (name === 'roles') loadRoles();
  else loadUsers();
}

/* ══════════════ ROLES ══════════════ */
let rolesCache = [];

async function loadRoles() {
  try {
    const tbody = document.getElementById('roles-tbody');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Loading…</td></tr>';
    const data = await apiFetch('/roles');
    rolesCache = data.data;
    renderRoles();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function renderRoles() {
  const tbody = document.getElementById('roles-tbody');
  if (!rolesCache.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">No roles found.</td></tr>';
    return;
  }
  tbody.innerHTML = rolesCache.map((r, i) => `
    <tr>
      <td>${i + 1}</td>
      <td><strong>${escHtml(r.name)}</strong></td>
      <td style="color:var(--muted)">${escHtml(r.description) || '—'}</td>
      <td style="color:var(--muted);white-space:nowrap">${fmtDate(r.created_at)}</td>
      <td>
        <div class="actions">
          <button class="btn btn-ghost btn-sm" onclick="openRoleModal(${r.id})">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDelete('role',${r.id},'${escHtml(r.name)}')">🗑 Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function openRoleModal(id) {
  document.getElementById('role-id').value = id || '';
  document.getElementById('role-modal-title').textContent = id ? 'Edit Role' : 'New Role';
  document.getElementById('role-name').value = '';
  document.getElementById('role-description').value = '';

  if (id) {
    const r = rolesCache.find(x => x.id == id);
    if (r) {
      document.getElementById('role-name').value = r.name;
      document.getElementById('role-description').value = r.description || '';
    }
  }
  document.getElementById('role-modal').classList.remove('hidden');
  document.getElementById('role-name').focus();
}

async function saveRole() {
  const id = document.getElementById('role-id').value;
  const name = document.getElementById('role-name').value.trim();
  const description = document.getElementById('role-description').value.trim();

  if (!name) { toast('Role name is required', 'error'); return; }

  const btn = document.getElementById('role-save-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  try {
    if (id) {
      await apiFetch(`/roles/${id}`, { method: 'PUT', body: JSON.stringify({ name, description }) });
      toast('Role updated successfully');
    } else {
      await apiFetch('/roles', { method: 'POST', body: JSON.stringify({ name, description }) });
      toast('Role created successfully');
    }
    closeModal('role-modal');
    loadRoles();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    btn.innerHTML = 'Save';
    btn.disabled = false;
  }
}

/* ══════════════ USERS ══════════════ */
let usersCache = [];

async function loadUsers() {
  try {
    const tbody = document.getElementById('users-tbody');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">Loading…</td></tr>';
    const data = await apiFetch('/users');
    usersCache = data.data;
    renderUsers();
  } catch (e) {
    toast(e.message, 'error');
  }
}

function renderUsers() {
  const tbody = document.getElementById('users-tbody');
  if (!usersCache.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">No users found.</td></tr>';
    return;
  }
  tbody.innerHTML = usersCache.map((u, i) => `
    <tr>
      <td>${i + 1}</td>
      <td><img class="avatar" src="${escHtml(u.avatarUrl)}" alt="" onerror="this.src='https://i.sstatic.net/l60Hf.png'" /></td>
      <td><strong>${escHtml(u.username)}</strong></td>
      <td style="color:var(--muted)">${escHtml(u.email)}</td>
      <td>${escHtml(u.fullName) || '—'}</td>
      <td>${u.role ? `<span style="font-weight:500">${escHtml(u.role.name)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
      <td>
        <span class="badge ${u.status ? 'badge-active' : 'badge-inactive'}">
          ${u.status ? 'Active' : 'Inactive'}
        </span>
      </td>
      <td style="text-align:center">${u.loginCount}</td>
      <td>
        <div class="actions">
          <button class="btn btn-ghost btn-sm" onclick="openUserModal(${u.id})">✏️ Edit</button>
          ${u.status
            ? `<button class="btn btn-warning btn-sm" onclick="toggleUser(${u.id}, false)">⏸ Disable</button>`
            : `<button class="btn btn-success btn-sm" onclick="toggleUser(${u.id}, true)">▶ Enable</button>`
          }
          <button class="btn btn-danger btn-sm" onclick="confirmDelete('user',${u.id},'${escHtml(u.username)}')">🗑 Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function openUserModal(id) {
  // Populate roles dropdown
  if (!rolesCache.length) {
    try {
      const data = await apiFetch('/roles');
      rolesCache = data.data;
    } catch (_) {}
  }
  const roleSelect = document.getElementById('user-role');
  roleSelect.innerHTML = '<option value="">— No role —</option>' +
    rolesCache.map(r => `<option value="${r.id}">${escHtml(r.name)}</option>`).join('');

  document.getElementById('user-id').value = id || '';
  document.getElementById('user-modal-title').textContent = id ? 'Edit User' : 'New User';
  document.getElementById('user-username').value = '';
  document.getElementById('user-email').value = '';
  document.getElementById('user-password').value = '';
  document.getElementById('user-fullname').value = '';
  document.getElementById('user-avatar').value = '';
  document.getElementById('user-status').value = '0';
  document.getElementById('user-role').value = '';

  const pwdLabel = document.getElementById('user-password-label');
  const pwdHint  = document.getElementById('user-password-hint');

  if (id) {
    const u = usersCache.find(x => x.id == id);
    if (u) {
      document.getElementById('user-username').value = u.username;
      document.getElementById('user-email').value = u.email;
      document.getElementById('user-fullname').value = u.fullName || '';
      document.getElementById('user-avatar').value = u.avatarUrl || '';
      document.getElementById('user-status').value = u.status ? '1' : '0';
      document.getElementById('user-role').value = u.role ? u.role.id : '';
    }
    pwdLabel.innerHTML = 'New Password';
    pwdHint.textContent = 'Leave blank to keep current password';
  } else {
    pwdLabel.innerHTML = 'Password <span style="color:var(--danger)">*</span>';
    pwdHint.textContent = '';
  }

  document.getElementById('user-modal').classList.remove('hidden');
  document.getElementById('user-username').focus();
}

async function saveUser() {
  const id       = document.getElementById('user-id').value;
  const username = document.getElementById('user-username').value.trim();
  const email    = document.getElementById('user-email').value.trim();
  const password = document.getElementById('user-password').value;
  const fullName = document.getElementById('user-fullname').value.trim();
  const avatarUrl= document.getElementById('user-avatar').value.trim();
  const status   = document.getElementById('user-status').value === '1';
  const role     = document.getElementById('user-role').value || undefined;

  if (!id && (!username || !email || !password)) {
    toast('Username, email and password are required', 'error'); return;
  }

  const body = { username, email, fullName, avatarUrl, status, role };
  if (password) body.password = password;

  const btn = document.getElementById('user-save-btn');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  try {
    if (id) {
      await apiFetch(`/users/${id}`, { method: 'PUT', body: JSON.stringify(body) });
      toast('User updated successfully');
    } else {
      body.password = password;
      await apiFetch('/users', { method: 'POST', body: JSON.stringify(body) });
      toast('User created successfully');
    }
    closeModal('user-modal');
    loadUsers();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    btn.innerHTML = 'Save';
    btn.disabled = false;
  }
}

async function toggleUser(id, enable) {
  const u = usersCache.find(x => x.id == id);
  if (!u) return;
  try {
    await apiFetch(enable ? '/users/enable' : '/users/disable', {
      method: 'POST',
      body: JSON.stringify({ username: u.username, email: u.email }),
    });
    toast(`User ${enable ? 'enabled' : 'disabled'} successfully`);
    loadUsers();
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ══════════════ DELETE CONFIRM ══════════════ */
function confirmDelete(type, id, name) {
  document.getElementById('confirm-message').textContent =
    `Are you sure you want to delete ${type} "${name}"? This action cannot be undone.`;
  document.getElementById('confirm-ok-btn').onclick = () => doDelete(type, id);
  document.getElementById('confirm-modal').classList.remove('hidden');
}

async function doDelete(type, id) {
  try {
    await apiFetch(`/${type}s/${id}`, { method: 'DELETE' });
    toast(`${type.charAt(0).toUpperCase() + type.slice(1)} deleted successfully`);
    closeModal('confirm-modal');
    if (type === 'role') loadRoles(); else loadUsers();
  } catch (e) {
    toast(e.message, 'error');
  }
}

/* ══════════════ MODALS ══════════════ */
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

// Close modal when clicking overlay
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.add('hidden');
  });
});

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(m => m.classList.add('hidden'));
});

/* ══════════════ INIT ══════════════ */
loadRoles();
</script>
</body>
</html>
